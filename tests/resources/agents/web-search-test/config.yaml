# Regression fixture for the WebSearchTool async-dispatch path.
# Used by tests/e2e/test_web_search_async_dispatch_e2e.py.
spec_version: 1

name: web-search-test
description: Minimal agent exercising web_search async dispatch on a non-OpenAI model.

# Force openai-agents harness explicitly. With the default
# executor.type=omnigent, the runner computes harness="omnigent" — not in
# _HARNESS_MODULES — and never spawns one, returning empty output.
executor:
  type: omnigent
  model: gpt-5.4-mini
  connection:
    api_key: ${OPENAI_API_KEY}
  config:
    harness: openai-agents

tools:
  builtins:
    - name: web_search
      search_provider: perplexity
      api_key: ${PERPLEXITY_API_KEY}

interaction:
  modalities:
    input: [text]
    output: [text]

# spec_v1 reads ``instructions:``, not ``prompt:``.
instructions: |
  You are a research assistant whose ONLY tool is ``web_search``.
  For every user request you MUST call ``web_search`` at least once
  before responding. Quote the result verbatim.
