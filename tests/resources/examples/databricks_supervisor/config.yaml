# Databricks supervisor agent — server-runs-tools demo.
#
# Routes the entire turn (model call AND tool execution) through the
# Databricks supervisor gateway at
# ``${WORKSPACE}/ai-gateway/mlflow/v1/responses``. Tools below are
# executed server-side; omnigent just streams observations back.
#
# Quick start:
#
#   1. Set your Databricks credentials. Either:
#        databricks auth login
#      OR add a [DEFAULT] profile to ~/.databrickscfg:
#        [DEFAULT]
#        host       = https://<your-workspace>.cloud.databricks.com
#        auth_type  = databricks-cli
#      Any workspace where the Supervisor API preview is enabled
#      will work; swap the profile name in ``executor.profile``
#      below if you'd rather not use ``[DEFAULT]``.
#
#      NOTE: this resolver does NOT honor OPENAI_BASE_URL /
#      OPENAI_API_KEY because those env vars are used elsewhere in
#      the repo to point at full ``/serving-endpoints`` URLs and
#      would produce malformed gateway URLs here.
#
#   2. Optionally set the tool inputs:
#        export GENIE_SPACE_ID=<your-space-id>
#        export UC_FUNCTION_NAME=catalog.schema.fn
#
#   3. Run from the BUNDLE DIRECTORY, not this file:
#        omnigent examples/databricks_supervisor -p "list files"
#      The supervisor format uses the omnigent directory-bundle
#      layout (this file lives at ``<bundle>/config.yaml``). Single-
#      file native Omnigent YAML loading is a future workstream — pass the
#      directory, not the file.

spec_version: 1
name: databricks-supervisor
prompt: |
  You are a Databricks supervisor agent. Use the tools available
  to answer the user's questions, grounding answers in their data
  and connected services.
executor:
  type: omnigent
  model: databricks-claude-sonnet-4-6
  config:
    harness: databricks_supervisor
  profile: oss
# Tools use the real Supervisor API nested shape:
#   {type: <tool_type>, <tool_type>: {<config>}}
# (the simplified flat form was rejected by the gateway).
#
# Only the Google Drive system connector is enabled by default — it
# requires no Unity Catalog setup, so the example works on any
# workspace where the Supervisor preview is on. To exercise other
# tool types, uncomment the entries below and supply a real
# Genie space ID and UC function name (catalog.schema.function).
tools:
  - type: uc_connection
    uc_connection:
      name: system_ai_agent_google_drive
      description: "Search team Google Drive"
  - type: uc_connection
    uc_connection:
      name: system_ai_agent_atlassian_mcp
      description: "search atalassian"
  # - type: genie_space
  #   genie_space:
  #     id: <your-genie-space-id>
  #     description: "Sales analytics genie space"
  # - type: uc_function
  #   uc_function:
  #     name: catalog.schema.fn
  #     description: "Custom UC function tool"
