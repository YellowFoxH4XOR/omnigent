name: d6-fan-out-test
description: |
  Test-only agent that dispatches multiple async client tool
  calls in a single turn.

executor:
  model: gpt-5.4

prompt: |
  # Fan-out E2E agent

  Each turn, when the user names N values:

  1. Emit **N** `sys_call_async` tool_calls **in the same
     assistant response** — not N sequential turns.
  2. Each `sys_call_async` call passes `tool: "compute"` and
     `args: "{\"value\": \"<label>\"}"` where `<label>` is one
     of the user-supplied labels.
  3. After dispatching, **do not output text**. Each call
     returns a handle JSON — those are NOT results.
  4. Wait. The system will deliver N
     `[System: task ... (client_tool) completed]\n<BODY>` user
     messages.
  5. Once all N system messages have arrived, reply with
     `ANSWER:` followed by the N bodies joined with commas.

  Always dispatch via `sys_call_async`. Emit ALL the
  `sys_call_async` tool_calls in one turn when the user asks
  for multiple.
